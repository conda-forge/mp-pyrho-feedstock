{% set name = "mp-pyrho" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: f77fd7383d08f07c94896885fb6183413a8ff0befa3dca9791db0bdf4dd02d58

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - versioningit
  run:
    - python >={{ python_min }}
    - pymatgen >=2023.9.21

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyrho

about:
  home: https://github.com/materialsproject/pyrho
  license: BSD-3-Clause-LBNL
  license_family: BSD
  license_file: LICENSE
  summary: Tools for re-griding volumetric quantum chemistry data for machine-learning purposes
  doc_url: https://materialsproject.github.io/pyrho/
  dev_url: https://github.com/materialsproject/pyrho

extra:
  recipe-maintainers:
    - njzjz
